<!DOCTYPE html>
<html>
<head>
<style>
  .scramble-chars { font-family: 'Inter', sans-serif; color: red; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrambleTextPlugin.min.js"></script>
</head>
<body>
  <div id="text">Hello World</div>
  <script>
    gsap.to("#text", { duration: 3, scrambleText: { text: "Goodbye", chars: ".:", oldClass: "scramble-chars" } });
  </script>
</body>
</html>
